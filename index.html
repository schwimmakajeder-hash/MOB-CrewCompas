<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ff0000" /> <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>MOB - Mann über Bord</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="app">
    <div id="start-screen" class="screen active">
      <header class="header">
        <h1 class="title">MOB</h1>
        <p class="subtitle">Mann über Bord</p>
      </header>

      <main class="main-content">
        <div class="button-wrapper">
          <div class="pulse-ring"></div>
          <div class="pulse-ring-2"></div>
          <button id="mob-button" class="emergency-button">
            <span>MOB</span>
          </button>
        </div>
        <p id="status-text" class="status">Drücken um Position sofort zu speichern</p>
      </main>
    </div>

    <div id="map-screen" class="screen">
      <div class="map-container">
        <div id="map"></div>
        <div id="map-overlay" title="Auf Google Maps vergrößern"></div>
        <button id="open-maps-btn" class="maps-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            class="maps-icon">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"></polygon>
            <line x1="9" y1="3" x2="9" y2="18"></line>
            <line x1="15" y1="6" x2="15" y2="21"></line>
          </svg>
          In Maps öffnen
        </button>
      </div>
      <div class="info-panel">
        <div class="panel-header">
          <h2>MOB GESPEICHERT</h2>
        </div>
        <div class="coordinates">
          <div class="coord-item">
            <span class="label">Breitengrad (Lat):</span>
            <span id="lat-val" class="value">--.------°</span>
          </div>
          <div class="coord-item">
            <span class="label">Längengrad (Lon):</span>
            <span id="lon-val" class="value">--.------°</span>
          </div>
          <div class="coord-item">
            <span class="label">Genauigkeit:</span>
            <span id="acc-val" class="value">- m</span>
          </div>
        </div>
        <div class="time-item">
          <span class="label">Zeitpunkt (Lokal):</span>
          <span id="time-val" class="value">--:--:--</span>
        </div>
        <button id="reset-button" class="secondary-button">Neu Starten</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registriert!'))
          .catch(err => console.log('Service Worker Fehler:', err));
      });
    }
  </script>
</body>

</html>
